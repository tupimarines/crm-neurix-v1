<!-- Neurix CRM Login Screen -->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Neurix CRM - Login</title>
    <meta name="description" content="Faça login no Neurix CRM para gerenciar sua produção de geleias artesanais." />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c2bee",
                        "primary-light": "#a855f7",
                        "primary-dark": "#6b21a8",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                        "neutral-surface": "#ffffff",
                        "neutral-border": "#e9d5ff",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(140, 43, 238, 0.1)',
                        'glow': '0 0 20px rgba(140, 43, 238, 0.15)'
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .bg-pattern {
            background-image: radial-gradient(#8c2bee 0.5px, transparent 0.5px), radial-gradient(#8c2bee 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            opacity: 0.03;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col relative overflow-hidden text-slate-900 dark:text-slate-100 font-display">
    <!-- Background Decoration -->
    <div
        class="absolute inset-0 z-0 bg-gradient-to-br from-purple-50 via-white to-purple-100 dark:from-gray-900 dark:via-gray-900 dark:to-[#2a1b3d]">
    </div>
    <div class="absolute inset-0 z-0 bg-pattern"></div>
    <div
        class="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] rounded-full bg-primary/5 blur-[100px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] rounded-full bg-primary/10 blur-[120px] pointer-events-none">
    </div>

    <div
        class="layout-container flex h-full grow flex-col relative z-10 justify-center items-center py-10 px-4 sm:px-6 lg:px-8">
        <div class="w-full max-w-[440px] flex flex-col gap-6">
            <!-- Header Section -->
            <div class="text-center mb-2">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 mb-6 text-primary shadow-glow">
                    <span class="material-symbols-outlined text-4xl">dataset</span>
                </div>
                <h1 class="text-slate-900 dark:text-white text-3xl font-extrabold tracking-tight mb-2">Neurix CRM</h1>
                <p class="text-slate-500 dark:text-slate-400 text-base">Faça login para gerenciar sua produção</p>
            </div>

            <!-- Login Card -->
            <div class="glass-effect rounded-2xl shadow-soft border border-neutral-border/50 p-8 sm:p-10 w-full">
                <form id="login-form" class="flex flex-col gap-5">
                    <!-- Email Field -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">Email
                            Corporativo</label>
                        <div class="relative group">
                            <div
                                class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                <span class="material-symbols-outlined text-[20px]">mail</span>
                            </div>
                            <input autocomplete="email"
                                class="w-full h-12 pl-11 pr-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200"
                                id="email" placeholder="nome@neurix.com" type="email" required />
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center ml-1">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300"
                                for="password">Senha</label>
                            <a class="text-sm font-medium text-primary hover:text-primary-dark transition-colors"
                                href="#">Esqueceu a senha?</a>
                        </div>
                        <div class="relative group">
                            <div
                                class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                <span class="material-symbols-outlined text-[20px]">lock</span>
                            </div>
                            <input
                                class="w-full h-12 pl-11 pr-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200"
                                id="password" placeholder="••••••••" type="password" required />
                        </div>
                    </div>

                    <!-- Error Message -->
                    <div id="login-error" class="hidden text-red-500 text-sm text-center"></div>

                    <!-- Submit Button -->
                    <button type="submit" id="login-btn"
                        class="mt-2 w-full h-12 bg-primary hover:bg-primary-dark text-white font-bold rounded-xl shadow-lg shadow-primary/30 hover:shadow-primary/40 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group">
                        <span>Entrar na Plataforma</span>
                        <span
                            class="material-symbols-outlined group-hover:translate-x-1 transition-transform text-[20px]">arrow_forward</span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase tracking-wider">
                        <span class="bg-white dark:bg-slate-800 px-3 text-slate-400">Acesso Seguro</span>
                    </div>
                </div>

                <!-- Footer Links -->
                <div class="flex items-center justify-center gap-6 text-sm text-slate-500">
                    <a class="hover:text-primary transition-colors flex items-center gap-1" href="#">
                        <span class="material-symbols-outlined text-[18px]">help</span> Ajuda
                    </a>
                    <a class="hover:text-primary transition-colors flex items-center gap-1" href="#">
                        <span class="material-symbols-outlined text-[18px]">privacy_tip</span> Privacidade
                    </a>
                </div>
            </div>

            <!-- Bottom Info -->
            <div class="text-center space-y-2">
                <p class="text-xs text-slate-400 dark:text-slate-500 font-medium">
                    Neurix CRM v1.0 • Sua fábrica de geleias conectada
                </p>
                <div class="flex justify-center gap-2">
                    <div class="h-1 w-1 rounded-full bg-primary/40"></div>
                    <div class="h-1 w-1 rounded-full bg-primary/40"></div>
                    <div class="h-1 w-1 rounded-full bg-primary/40"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Configure API base URL
        window.NEURIX_API_BASE = 'http://localhost:8000/api';

        // Redirect to dashboard if already authenticated
        if (Auth.isAuthenticated()) {
            window.location.href = '/dashboard.html';
        }

        // Handle login form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            errorEl.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin material-symbols-outlined text-[20px]">progress_activity</span> Entrando...';

            try {
                await Auth.login(email, password);
                window.location.href = '/dashboard.html';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = '<span>Entrar na Plataforma</span><span class="material-symbols-outlined group-hover:translate-x-1 transition-transform text-[20px]">arrow_forward</span>';
            }
        });
    </script>
</body>

</html>
