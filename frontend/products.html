<!-- Neurix CRM Gestão de Produtos -->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Neurix CRM - Produtos</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#8b5cf6", "primary-hover": "#7c3aed", "primary-light": "#ede9fe",
                        "background-light": "#f8fafc", "surface-light": "#ffffff",
                        "background-dark": "#0f172a", "surface-dark": "#1e293b",
                        "text-main-light": "#1e293b", "text-secondary-light": "#64748b",
                        "text-main-dark": "#f1f5f9", "text-secondary-dark": "#94a3b8",
                        "border-light": "#e2e8f0", "border-dark": "#334155",
                    },
                    fontFamily: { display: ["Outfit", "sans-serif"], body: ["Inter", "sans-serif"] },
                },
            },
        };
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark font-body antialiased">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar (same as dashboard) -->
        <aside
            class="w-64 bg-surface-light dark:bg-surface-dark border-r border-border-light dark:border-border-dark flex-shrink-0 hidden md:flex flex-col">
            <div class="h-16 flex items-center px-6 border-b border-border-light dark:border-border-dark">
                <div class="flex items-center gap-2">
                    <span class="material-icons-round text-primary text-3xl">token</span>
                    <span class="font-display font-bold text-xl tracking-tight">Neurix<span
                            class="text-primary">CRM</span></span>
                </div>
            </div>
            <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-1">
                <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-text-secondary-light hover:bg-slate-100 hover:text-primary transition-colors"
                    href="dashboard.html">
                    <span class="material-icons-round">dashboard</span> Painel
                </a>
                <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-text-secondary-light hover:bg-slate-100 hover:text-primary transition-colors"
                    href="kanban.html">
                    <span class="material-icons-round">filter_alt</span> Funil de Vendas
                </a>
                <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-primary-light dark:bg-primary/20 text-primary font-medium"
                    href="products.html">
                    <span class="material-icons-round">inventory_2</span> Produtos
                </a>
                <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-text-secondary-light hover:bg-slate-100 hover:text-primary transition-colors"
                    href="#">
                    <span class="material-icons-round">people</span> Contatos
                </a>
                <div class="pt-4 mt-4 border-t border-border-light dark:border-border-dark">
                    <span
                        class="px-3 text-xs font-semibold text-text-secondary-light uppercase tracking-wider">Sistema</span>
                </div>
                <a class="flex items-center gap-3 px-3 py-2.5 mt-2 rounded-xl text-text-secondary-light hover:bg-slate-100 hover:text-primary transition-colors"
                    href="settings.html">
                    <span class="material-icons-round">settings</span> Configurações
                </a>
            </nav>
            <div class="p-4 border-t border-border-light dark:border-border-dark">
                <div class="flex items-center gap-3">
                    <div
                        class="w-9 h-9 rounded-full bg-primary/10 text-primary flex items-center justify-center text-sm font-bold">
                        AF</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate" data-user-name>Admin</p>
                        <p class="text-xs text-text-secondary-light truncate" data-user-email></p>
                    </div>
                    <button class="text-text-secondary-light hover:text-primary" data-action="logout">
                        <span class="material-icons-round text-lg">logout</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-6 lg:p-10 max-w-7xl mx-auto space-y-8">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-2xl font-display font-bold">Gestão de Produtos</h1>
                        <p class="text-text-secondary-light mt-1">Gerencie o catálogo de geleias artesanais.</p>
                    </div>
                    <button id="btn-new-product"
                        class="bg-primary hover:bg-primary-hover text-white px-4 py-2 rounded-xl shadow-lg shadow-primary/30 flex items-center gap-2 text-sm font-medium">
                        <span class="material-icons-round text-sm">add</span> Novo Produto
                    </button>
                </div>

                <!-- Product Cards Grid -->
                <div id="product-cards-grid"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <p class="col-span-full text-center text-slate-400 py-12">Carregando produtos...</p>
                </div>

                <!-- Product Table -->
                <div
                    class="bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm border border-border-light dark:border-border-dark overflow-hidden">
                    <div class="p-6 border-b border-border-light dark:border-border-dark">
                        <h2 class="text-lg font-display font-semibold">Catálogo Completo</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead
                                class="bg-slate-50 dark:bg-slate-800/50 text-text-secondary-light uppercase tracking-wider text-xs font-semibold">
                                <tr>
                                    <th class="px-6 py-4">Produto</th>
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4">Preço Unit.</th>
                                    <th class="px-6 py-4 text-right">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="product-table-body" class="divide-y divide-border-light dark:divide-border-dark">
                                <tr>
                                    <td colspan="4" class="px-6 py-8 text-center text-slate-400">Carregando...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>window.NEURIX_API_BASE = 'http://localhost:8000/api';</script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/products.js"></script>
</body>

</html>
