# Neurix CRM — Docker Compose
# Runs: FastAPI Backend + Webhook Worker
# Supabase and Redis run separately on Dokploy

services:
  backend:
    build: ./backend
    container_name: neurix-crm-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker for processing webhook events from Redis queue
  worker:
    build: ./backend
    container_name: neurix-crm-worker
    command: ["python", "-m", "app.workers.webhook_processor"]
    env_file:
      - ./backend/.env
    restart: unless-stopped
