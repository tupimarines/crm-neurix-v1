# Neurix CRM — Docker Compose
# Runs: FastAPI Backend + Redis
# Supabase runs separately on Dokploy (via template)

services:
  backend:
    build: ./backend
    container_name: neurix-crm-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker for processing webhook events from Redis queue
  worker:
    build: ./backend
    container_name: neurix-crm-worker
    command: ["python", "-m", "app.workers.webhook_processor"]
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: neurix-crm-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
