# Neurix CRM — Docker Compose
# Runs: FastAPI Backend + Webhook Worker + Next.js Frontend
# Redis runs separately on Dokploy
# Env vars are injected by Dokploy (no env_file needed)

services:
  frontend:
    build: ./frontend-next
    container_name: neurix-crm-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: neurix-crm-backend
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=${APP_NAME:-Neurix CRM}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - SESSION_DURATION_DAYS=${SESSION_DURATION_DAYS:-14}
      - TWO_FACTOR_ENABLED=${TWO_FACTOR_ENABLED:-true}
      - UAZAPI_URL=${UAZAPI_URL}
      - UAZAPI_ADMIN_TOKEN=${UAZAPI_ADMIN_TOKEN}
      - UAZAPI_INSTANCE_TOKEN=${UAZAPI_INSTANCE_TOKEN}
      - UAZAPI_WEBHOOK_SECRET=${UAZAPI_WEBHOOK_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: ./backend
    container_name: neurix-crm-worker
    command: ["python", "-m", "app.workers.webhook_processor"]
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - UAZAPI_URL=${UAZAPI_URL}
      - UAZAPI_ADMIN_TOKEN=${UAZAPI_ADMIN_TOKEN}
      - UAZAPI_INSTANCE_TOKEN=${UAZAPI_INSTANCE_TOKEN}
      - UAZAPI_WEBHOOK_SECRET=${UAZAPI_WEBHOOK_SECRET}
    restart: unless-stopped
