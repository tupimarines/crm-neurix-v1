# Neurix CRM — Docker Compose
# Runs: FastAPI Backend + Webhook Worker + Next.js Frontend
# Redis runs separately on Dokploy

services:
  frontend:
    build: ./frontend-next
    container_name: neurix-crm-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: neurix-crm-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: ./backend
    container_name: neurix-crm-worker
    command: ["python", "-m", "app.workers.webhook_processor"]
    env_file:
      - ./backend/.env
    restart: unless-stopped
